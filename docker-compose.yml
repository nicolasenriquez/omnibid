services:
  db:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chilecompra}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - omnibid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chilecompra}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  db_test:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    profiles:
      - test
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-chilecompra_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - omnibid_pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-postgres} -d ${POSTGRES_TEST_DB:-chilecompra_test}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-app-chilecompra}
      APP_PORT: ${APP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/chilecompra
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@db_test:5432/chilecompra_test
      DATASET_ROOT: ${DATASET_ROOT:-/datasets/mercado-publico}
      CHUNK_SIZE: ${CHUNK_SIZE:-5000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
      - type: bind
        source: ${DATASET_HOST_PATH:-./data/datasets/mercado-publico}
        target: /datasets/mercado-publico
        read_only: true
    read_only: true
    tmpfs:
      - /tmp
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  backend-tools:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-app-chilecompra}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/chilecompra
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@db_test:5432/chilecompra_test
      DATASET_ROOT: ${DATASET_ROOT:-/datasets/mercado-publico}
      CHUNK_SIZE: ${CHUNK_SIZE:-5000}
    init: true
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - tail
      - -f
      - /dev/null

  client:
    image: node:24-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:${CLIENT_PORT:-3000}:3000"
    volumes:
      - type: bind
        source: ./client
        target: /app
      - type: volume
        source: omnibid_client_node_modules
        target: /app/node_modules
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - sh
      - -c
      - npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  omnibid_pgdata:
  omnibid_pgdata_test:
  omnibid_client_node_modules:
