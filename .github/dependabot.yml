version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1,15 * *"
      timezone: "America/Santiago"
    cooldown:
      default-days: 10
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python:uv"
    groups:
      backend-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "cron"
      cronjob: "0 9 1,15 * *"
      timezone: "America/Santiago"
    cooldown:
      default-days: 10
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(client-deps)"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      client-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      client-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 1,15 * *"
      timezone: "America/Santiago"
    cooldown:
      default-days: 10
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-non-major:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
