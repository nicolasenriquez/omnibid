name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: 8.30.1

  backend:
    name: Backend Gates
    runs-on: ubuntu-latest
    needs: [secret-scan]
    permissions:
      contents: read
    env:
      DATASET_HOST_PATH: ./data/datasets/mercado-publico
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare CI dataset mount path
        run: mkdir -p data/datasets/mercado-publico

      - name: Build backend tools image
        run: docker compose --env-file .env.docker -f docker-compose.yml build backend-tools

      - name: Lint (Ruff)
        run: docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync ruff check backend tests scripts

      - name: Type checks (MyPy)
        run: docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync mypy backend scripts

      - name: Unit tests
        run: docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync pytest -q -m "not integration"

      - name: Type strict checks (Pyright + ty)
        run: |
          docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync pyright backend scripts
          docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync ty check backend

      - name: Security scan (Bandit)
        run: docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync bandit -c pyproject.toml -r backend --severity-level high --confidence-level high

      - name: Integration tests
        run: |
          docker compose --env-file .env.docker -f docker-compose.yml --profile test up -d --wait db_test
          docker compose --env-file .env.docker -f docker-compose.yml run --rm --build backend-tools uv run --no-sync python scripts/test_db_guard.py run-integration

      - name: Compose cleanup
        if: always()
        run: docker compose --env-file .env.docker -f docker-compose.yml --profile test down --remove-orphans

  frontend:
    name: Frontend Gates
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Frontend lint/type/build (containerized)
        env:
          CI: "true"
        run: |
          docker run --rm \
            -e CI=true \
            -v "${{ github.workspace }}/client:/app" \
            -w /app \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            sh -lc "npm ci && npm run lint && npm run typecheck && npm run build"
